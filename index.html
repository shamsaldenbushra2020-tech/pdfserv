<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عارض ملفات PDF مخصص</title>
    <!-- استدعاء مكتبة PDF.js من خادم CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #2f3542;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        /* حاوية العارض لمنع أي تحكم خارجي */
        .pdf-container {
            background: #ffffff;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            border-radius: 8px;
            overflow: hidden;
            max-width: 100%;
            position: relative;
        }
        /* منع المستخدم من الضغط المطول أو التحديد لحماية المحتوى إن لزم الأمر */
        canvas {
            display: block;
            max-width: 100%;
            height: auto;
            user-select: none;
            -webkit-user-select: none;
        }
    </style>
</head>
<body>

    <div class="pdf-container" id="pdfViewer">
        <!-- سيتم توليد صفحات الـ PDF هنا تلقائياً كعناصر Canvas -->
    </div>

    <script>
        // تحديد رابط ملف الـ PDF (يمكن أن يكون ملفاً محلياً بجانب الكود أو رابطاً مباشراً)
        const pdfUrl = '001.pdf'; 

        // إعداد المكتبة
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        // تحميل وقراءة الملف
        pdfjsLib.getDocument(pdfUrl).promise.then(pdf => {
            const container = document.getElementById('pdfViewer');
            
            // حلقة لتكرار العملية على كل صفحات الملف وعرضها متتالية
            for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
                pdf.getPage(pageNum).then(page => {
                    const scale = 1.5; // التحكم في جودة ووضوح العرض
                    const viewport = page.getViewport({ scale: scale });

                    // إنشاء عنصر canvas لكل صفحة
                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;

                    // إضافة الـ canvas إلى الحاوية الرئيسية
                    container.appendChild(canvas);

                    // ريندر (رسم) الصفحة داخل الـ canvas
                    const renderContext = {
                        canvasContext: context,
                        viewport: viewport
                    };
                    page.render(renderContext);
                });
            }
        }).catch(error => {
            console.error('حدث خطأ أثناء تحميل ملف الـ PDF:', error);
        });
    </script>

</body>
</html>
